plugins {
    id "com.android.application"
    id "kotlin-android"
    id "com.google.gms.google-services"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// Release signing: create android/key.properties (see README) with
// storeFile/storePassword/keyAlias/keyPassword. Falls back to debug keys
// when absent so local `flutter run --release` keeps working.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader('UTF-8') { reader ->
        keystoreProperties.load(reader)
    }
}

android {
    namespace = "com.dayla.app.dayla_flutter"
    // Pinned to API 36 (Android 16) for Google Play's Aug 31 2026 target
    // requirement. Explicit instead of flutter.compileSdkVersion, which the
    // bundled Flutter SDK still caps at 35.
    compileSdk = 36
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // Play Store identity — cannot change after first upload.
        applicationId = "com.dayla.app"
        // record_android (voice memos) requires 23; Android 6.0+ covers
        // effectively all active devices.
        minSdk = 23
        // API 36 (Android 16) — satisfies Play's 2026 target requirement.
        targetSdk = 36
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        if (keystorePropertiesFile.exists()) {
            release {
                keyAlias = keystoreProperties['keyAlias']
                keyPassword = keystoreProperties['keyPassword']
                storeFile = keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                storePassword = keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            signingConfig = keystorePropertiesFile.exists()
                    ? signingConfigs.release
                    : signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
