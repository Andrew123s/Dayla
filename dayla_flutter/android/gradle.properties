org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# AGP 8.7 was validated up to compileSdk 35; we intentionally compile against
# 36 (Android 16) for Play's 2026 requirement. Suppresses the advisory only —
# build-tools 36 + platform 36 handle API 36 correctly.
android.suppressUnsupportedCompileSdk=36
